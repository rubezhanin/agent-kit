name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate (JSON / YAML / dry-run / locale sanity)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt

      - name: Install dev requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate JSON
        run: |
          python scripts/check_release.py --json-only

      - name: Validate YAML
        run: |
          python -c "
          import os, sys, yaml
          errs = 0
          for root, _, files in os.walk('.'):
              if '/.git' in root or '/source' in root:
                  continue
              for f in files:
                  if not f.endswith(('.yaml', '.yml')):
                      continue
                  p = os.path.join(root, f)
                  try:
                      with open(p, encoding='utf-8') as fh:
                          text = fh.read()
                      # mkdocs.yml holds Material emoji tags like
                      # !!python/name:material.extensions.emoji.twemoji,
                      # which PyYAML's safe loader rejects. Use the FullLoader
                      # for that one file; safe_load for everything else.
                      if os.path.basename(p) == 'mkdocs.yml':
                          yaml.load(text, Loader=yaml.FullLoader)
                      else:
                          yaml.safe_load(text)
                  except Exception as e:
                      print('YAML FAIL', p, e)
                      errs += 1
          sys.exit(errs)
          "

      - name: Installer dry-run
        run: |
          python scripts/setup_kit.py --dry-run --include-disabled

      - name: Locale sanity (no cyrillic regressed into en/)
        run: |
          python scripts/check_locale_sanity.py

      - name: Origin Return Protocol validator
        run: |
          python scripts/check_orp.py

      - name: Kit health check
        run: |
          python scripts/health_check.py

  docs-build:
    name: Build docs (MkDocs, strict)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-docs.txt

      - name: Install docs requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Build docs
        run: |
          mkdocs build